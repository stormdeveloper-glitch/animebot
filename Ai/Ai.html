<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeUZ AI</title>
    <link rel="icon" type="image/png" href="../Ai/Ai.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../Ai/Ai.css">
</head>

<body>
    <div class="ai-page-wrap">
        <!-- Header -->
        <header class="ai-header">
            <a href="../index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>Orqaga</span>
            </a>

            <div class="ai-logo-title">
                <span class="sparkle">✦</span>
                <h1>AnimeUZ AI</h1>
            </div>

            <div class="status-container">
                <span class="status-dot pulsing"></span>
                <span class="status-text">UZGPT 4</span>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chatArea">
            <div class="chat-messages" id="chatMessages">
                <!-- Welcome Message -->
                <div class="msg-row bot">
                    <div class="msg-avatar">
                        <img src="../Ai/Ai.png" alt="AI">
                    </div>
                    <div class="msg-bubble">
                        Salom! Men <strong>UZGPT 4</strong> sun'iy intellekt yordamchisiman
                        <br><br>
                        Animelar haqida qidirish, dasturlash masalalari bo'yicha yordam yoki ijodiy matnlar yozishni
                        mendan so'rashingiz mumkin! 🚀
                    </div>
                </div>
            </div>
        </main>

        <!-- Suggestions -->
        <section class="suggestions-bar">
            <button class="sug-pill" onclick="sendSuggestion('Eng mashhur animelar qaysi?')">📈 Top Animelar</button>
            <button class="sug-pill" onclick="sendSuggestion('Naruto animeni mahalliy bazadan qidirib ber')">🔍 Anime
                qidirish</button>
            <button class="sug-pill"
                onclick="sendSuggestion('Python dasturlash tilida fibonachchi sonlarini hisoblash kodini yozib ber')">💻
                Fibonachchi kodi</button>
            <button class="sug-pill" onclick="sendSuggestion('Bot a\'zolari va adminlari soni haqida ma\'lumot ber')">📊
                Bot statistikasi</button>
        </section>

        <!-- Input Panel -->
        <footer class="input-panel">
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Xabaringizni kiriting..." maxlength="800"
                    autocomplete="off">
                <button id="sendBtn" title="Yuborish">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="../Ai/Ai.js" defer></script>
</body>

</html>
