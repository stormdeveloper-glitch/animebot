# Optional Nginx reverse proxy hardening for VPS deployments.
# Put this in /etc/nginx/sites-available/animeuz and proxy to python main.py.

limit_req_zone $binary_remote_addr zone=web_per_ip:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=media_per_ip:10m rate=4r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

upstream animeuz_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name anime.example.com;

    client_max_body_size 2m;
    client_body_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 30s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~* ^/(\.env|\.git|wp-|wordpress|xmlrpc\.php|phpmyadmin|adminer|vendor/phpunit|cgi-bin) {
        return 404;
    }

    location /api/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://animeuz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location ~ ^/(media|poster)/ {
        limit_req zone=media_per_ip burst=40 nodelay;
        limit_conn conn_per_ip 30;
        proxy_pass http://animeuz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        limit_req zone=web_per_ip burst=30 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://animeuz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
